<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="panel">
      <div id="panel1" class="sizing">
        <div class="panel-title text-color">TIME & WEATHER</div>
        <div id="local-time" class = "time text-color"></div>
        <div id="date" class = "date text-color">D</div>

        <div class="weather-info">        
          <div id="temp" class = "temp text-color">38C</div>

          <div class="more-weather-info">
            <div id="humidity" class = "humidity text-color">Humidity: 42%</div>
            <div id="wind" class = "wind text-color">Wind: 11 KM/H</div>
          </div>


        </div>

      </div>

      <div id="panel2" class="sizing">
        <div class="panel-title text-color">NEXT PRAYER</div>
        <div id="Next-Prayer"></div>
        <div class="Next-Prayer"></div>
      </div>

      <div id="panel3" class="sizing">
        <div class="panel-title text-color">WORLD CLOCKS</div>
      </div>

      <div id="panel4" class="sizing">
        <div class="panel-title text-color">HOTEL MESSAGES</div>
      </div>
    </div>


  <script src="./node_modules/axios/dist/axios.min.js"></script>
  <script src="app.js"> </script>

</body>
  
</html>
